  <circle cx="340" cy="165" r="13" fill="#f2b441"/>

  <circle cx="340" cy="270" r="19" fill="#f2b441"/>
  <circle cx="340" cy="270" r="8" fill="#0c2233"/>

  <text x="340" y="500" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="46" font-weight="700" letter-spacing="2" fill="#eef4f7">BURLINGTON</text>
  <text x="340" y="552" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="46" font-weight="700" letter-spacing="14" fill="#2dd4bf">MESH</text>
  <text x="340" y="592" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="400" letter-spacing="3.5" fill="#9fb6c2">MESH NETWORKS · HAM RADIO · MA</text>
