<svg width="680" height="680" viewBox="0 0 680 680" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Burlington Mesh logo</title>
  <desc>A square emblem with a hexagonal mesh network of nodes, concentric radio signal rings, and broadcast arcs, above the wordmark Burlington Mesh.</desc>

  <rect x="40" y="40" width="600" height="600" rx="84" fill="#0c2233"/>
  <rect x="40" y="40" width="600" height="600" rx="84" fill="none" stroke="#2dd4bf" stroke-width="3" stroke-opacity="0.35"/>

  <circle cx="340" cy="270" r="75" fill="none" stroke="#2dd4bf" stroke-width="2" stroke-opacity="0.22" stroke-dasharray="3 7"/>
  <circle cx="340" cy="270" r="135" fill="none" stroke="#2dd4bf" stroke-width="2" stroke-opacity="0.18" stroke-dasharray="3 7"/>

  <g stroke="#3f7d99" stroke-width="3" stroke-linecap="round">
    <line x1="340" y1="270" x2="340" y2="165"/>
    <line x1="340" y1="270" x2="431" y2="218"/>
    <line x1="340" y1="270" x2="431" y2="322"/>
    <line x1="340" y1="270" x2="340" y2="375"/>
    <line x1="340" y1="270" x2="249" y2="322"/>
    <line x1="340" y1="270" x2="249" y2="218"/>
  </g>
  <g stroke="#346a82" stroke-width="2.5" stroke-linecap="round" stroke-opacity="0.85">
    <line x1="340" y1="165" x2="431" y2="218"/>
    <line x1="431" y1="218" x2="431" y2="322"/>
    <line x1="431" y1="322" x2="340" y2="375"/>
    <line x1="340" y1="375" x2="249" y2="322"/>
    <line x1="249" y1="322" x2="249" y2="218"/>
    <line x1="249" y1="218" x2="340" y2="165"/>
  </g>

  <g fill="#f2b441">
    <circle cx="431" cy="218" r="12"/>
    <circle cx="431" cy="322" r="12"/>
    <circle cx="340" cy="375" r="12"/>
    <circle cx="249" cy="322" r="12"/>
    <circle cx="249" cy="218" r="12"/>
  </g>

  <g fill="none" stroke="#f2b441" stroke-width="3.5" stroke-linecap="round">
    <path d="M 318 154 A 22 22 0 0 1 362 154"/>
    <path d="M 306 142 A 34 34 0 0 1 374 142"/>
    <path d="M 294 130 A 46 46 0 0 1 386 130"/>
